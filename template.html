<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="title-slot">Intake</title>
<link rel="stylesheet" href="ifbase.css">
</head>
<body>
<div class="topbar">
  <span class="topbar-title" id="topbar-title-slot"></span>
  <div class="layout-toggle" id="layout-toggle">
    <button id="btn-wizard" type="button" class="active" onclick="setLayout('wizard')">Step-by-step</button>
    <button id="btn-grouped" type="button" onclick="setLayout('grouped')">All sections</button>
  </div>
</div>
<header class="header">
  <h1 id="heading-slot"></h1>
  <p id="subhead-slot"></p>
</header>
<div class="progress-bar" id="progress-bar-wrap">
  <div class="progress-steps" id="progress-steps"></div>
  <div class="progress-label">
    <span class="section-name" id="progress-section-label"></span>
    <span class="pct" id="progress-pct">0% complete</span>
  </div>
</div>
<main class="card fade-in" id="main-card">
  <form id="intake-form" autocomplete="off" onsubmit="return false">
    <div id="layout-wizard"></div>
    <div id="layout-grouped"></div>
  </form>
</main>

<!--
  ─────────────────────────────────────────────────────────────
  FORM SPEC — this is the ONLY block the agent edits.
  Everything else (layout, wiring, both views) is generated by ifbase.js.
  Schema: see SKILL.md
  ─────────────────────────────────────────────────────────────
-->
<script id="form-spec" type="application/json">
{
  "title": "Intake",
  "heading": "What are we building?",
  "subhead": "Quick check-in to align before work starts.",
  "exportTitle": "INTAKE EXPORT",
  "sections": [
    {
      "name": "Section A",
      "questions": [
        {
          "id": "example",
          "type": "radio",
          "label": "Example question — replace this whole spec block.",
          "required": true,
          "options": [
            { "value": "yes", "label": "Yes", "selected": true },
            { "value": "no", "label": "No" },
            { "value": "unsure", "label": "Not sure", "unsure": true }
          ]
        }
      ]
    }
  ],
  "knownContext": [],
  "routing": {}
}
</script>

<script src="ifbase.js"></script>
</body>
</html>
